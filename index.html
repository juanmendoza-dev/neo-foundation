<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Foundation</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Custom cursor -->
  <div class="cursor-reticle">
    <div class="cursor-ring"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-crosshair cursor-h"></div>
    <div class="cursor-crosshair cursor-v"></div>
  </div>

  <!-- Grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Three.js starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Hero Section -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <h1 class="hero-logo" data-splitting>NEO FOUNDATION</h1>
      <p class="hero-tagline">
        <span class="tagline-text"></span>
        <span class="tagline-cursor">_</span>
      </p>
    </div>
    <div class="shooting-star"></div>
  </section>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
